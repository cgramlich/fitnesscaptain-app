/* ============================================================
   WORKOUT LOGGING - the product. Big tap targets, pre-filled from last
   time, +/- steppers, rest timer. One JSONB doc per workout.
   ============================================================ */
function Stepper({ label, value, onChange, step, min }){
  const clamp = v => Math.max(min===undefined?0:min, Math.round(v*100)/100);
  return (
    <div className="stepper">
      <span className="lbl">{label}</span>
      <button className="step-btn" onClick={()=>onChange(clamp((Number(value)||0)-step))} aria-label={"Decrease "+label}>-</button>
      <input className="step-val" inputMode="decimal" value={String(value)}
        onChange={e=>{ const v=parseFloat(e.target.value); onChange(isNaN(v)?0:clamp(v)); }} />
      <button className="step-btn" onClick={()=>onChange(clamp((Number(value)||0)+step))} aria-label={"Increase "+label}>+</button>
    </div>
  );
}

/* One exercise inside a workout. Strength: reps x weight sets. Cardio and
   mobility: minutes + distance. The steppers seed from the last set here,
   else from the previous workout ("same as last time"), else defaults. */
function EntryCard({ entry, prev, units, active, onUpdate, onRemove, onSetLogged }){
  const isCardio = entry.type!=="strength";
  const wStep = units==="kg" ? 2.5 : 5;
  const sets = entry.sets || [];
  const seed = sets.length ? sets[sets.length-1]
             : (prev && prev.sets && prev.sets.length ? prev.sets[prev.sets.length-1] : { reps:10, weight:0 });
  const [reps, setReps]   = useState(Number(seed.reps)||0);
  const [weight, setWeight] = useState(Number(seed.weight)||0);
  const [mins, setMins]   = useState(entry.cardio ? Number(entry.cardio.minutes)||0 : 20);
  const [dist, setDist]   = useState(entry.cardio ? Number(entry.cardio.distance)||0 : 0);
  const [selIdx, setSelIdx] = useState(-1);   // set being edited, -1 = logging a new one

  const logSet = () => {
    const next = sets.slice();
    if(selIdx>=0 && selIdx<next.length){ next[selIdx] = { reps, weight }; setSelIdx(-1); }
    else { next.push({ reps, weight }); onSetLogged(); }
    onUpdate(e => ({ ...e, sets: next }));
  };
  const pickSet = (i) => {
    if(!active) return;
    if(selIdx===i){ setSelIdx(-1); return; }
    setSelIdx(i); setReps(Number(sets[i].reps)||0); setWeight(Number(sets[i].weight)||0);
  };
  const removeSet = (i) => {
    onUpdate(e => ({ ...e, sets: (e.sets||[]).filter((_,j)=>j!==i) }));
    if(selIdx===i) setSelIdx(-1);
  };
  const saveCardio = () => {
    onUpdate(e => ({ ...e, cardio: { minutes: mins, distance: dist, unit: units==="kg" ? "km" : "mi" } }));
  };

  return (
    <div className="entry">
      <div className="entry-head">
        <div style={{flex:1,minWidth:0}}>
          <div className="entry-name">{entry.name}</div>
          {prev && !isCardio &&
            <div className="entry-last">
              Last time: {prev.sets.length} set{prev.sets.length===1?"":"s"}, best {prev.best.reps} x {fmtW(prev.best.weight)} {units}
            </div>}
        </div>
        {active &&
          <button className="entry-x" onClick={onRemove} aria-label={"Remove "+entry.name}>
            <Icon d={ICONS.x} size={15}/>
          </button>}
      </div>

      {!isCardio && sets.map((s,i)=>(
        <button key={i} className={"set-row "+(selIdx===i?"sel":"")} onClick={()=>pickSet(i)}>
          <span className="set-num">SET {i+1}</span>
          <span className="set-main">{s.reps} x {fmtW(s.weight)} {units}</span>
          {active &&
            <span className="set-x" onClick={(ev)=>{ ev.stopPropagation(); removeSet(i); }} role="button" aria-label={"Delete set "+(i+1)}>
              <Icon d={ICONS.x} size={13}/>
            </span>}
        </button>
      ))}
      {isCardio && entry.cardio &&
        <div className="set-row" style={{cursor:"default"}}>
          <span className="set-num">DONE</span>
          <span className="set-main">
            {entry.cardio.minutes} min{Number(entry.cardio.distance)>0 ? " - "+fmtW(entry.cardio.distance)+" "+(entry.cardio.unit||"mi") : ""}
          </span>
        </div>}

      {active && !isCardio &&
        <div className="logger">
          <Stepper label="Reps" value={reps} onChange={setReps} step={1} min={0}/>
          <Stepper label={"Weight ("+units+")"} value={weight} onChange={setWeight} step={wStep} min={0}/>
          <button className="btn btn-primary btn-block log-set-btn" style={{marginTop:12}} onClick={logSet}>
            {selIdx>=0 ? "Update set "+(selIdx+1) : "Log set "+(sets.length+1)}
          </button>
          {selIdx>=0 &&
            <button className="btn btn-ghost btn-block btn-sm" style={{marginTop:8}} onClick={()=>setSelIdx(-1)}>
              Cancel edit
            </button>}
        </div>}
      {active && isCardio &&
        <div className="logger">
          <Stepper label="Minutes" value={mins} onChange={setMins} step={5} min={0}/>
          <Stepper label={"Dist ("+(units==="kg"?"km":"mi")+")"} value={dist} onChange={setDist} step={0.25} min={0}/>
          <button className="btn btn-primary btn-block" style={{marginTop:12}} onClick={saveCardio}>
            {entry.cardio ? "Update" : "Save"}
          </button>
        </div>}
    </div>
  );
}

/* Nested full-screen layer: pick an exercise from the library (or create one
   on the spot). Rendered INSIDE the editor at a higher z-index so the editor
   keeps its state (playbook rule: no two screens on one overlay variable). */
function ExercisePicker({ store, gym, onPick, onCreate, onClose }){
  const [q, setQ] = useState("");
  const [groupF, setGroupF] = useState("all");
  const needle = q.trim().toLowerCase();
  // Location-aware: flag exercises whose equipment this gym lacks. Only
  // meaningful when the gym has equipment tags; bodyweight/none always fit.
  const notHere = (x) => !!(gym && Array.isArray(gym.equipment) && gym.equipment.length &&
    x.equipment && ["barbell","dumbbell","kettlebell","machine","cable","band","treadmill","bike","rower"].includes(x.equipment) &&
    !gym.equipment.includes(x.equipment));
  const list = (store.data.exercises||[])
    .filter(x => groupF==="all" || x.muscleGroup===groupF)
    .filter(x => !needle || (x.name||"").toLowerCase().indexOf(needle)!==-1)
    .slice().sort((a,b)=> (notHere(a)?1:0)-(notHere(b)?1:0) || (a.name||"").localeCompare(b.name||""));
  return (
    <div className="layer">
      <div className="layer-inner">
        <div className="layer-top">
          <button className="icon-btn" onClick={onClose} aria-label="Back"><Icon d={ICONS.back} size={20}/></button>
          <h2>Add exercise</h2>
        </div>
        {gym && Array.isArray(gym.equipment) && gym.equipment.length>0 &&
          <div className="hint" style={{marginTop:2}}>Showing availability at {gym.name}.</div>}
        <div className="search-wrap" style={{marginTop:4}}>
          <input className="input" value={q} onChange={e=>setQ(e.target.value)}
            placeholder="Search the library" autoCapitalize="off" autoCorrect="off" autoFocus />
          {q &&
            <button className="search-x" onClick={()=>setQ("")} aria-label="Clear search">
              <Icon d={ICONS.x} size={16}/>
            </button>}
        </div>
        <div className="pills-row">
          {["all"].concat(MUSCLE_GROUPS).map(g =>
            <button key={g} className={"pill "+(groupF===g?"on":"")} onClick={()=>setGroupF(g)}>
              {g==="all" ? "All muscles" : g}
            </button>)}
        </div>
        {q.trim().length>1 && !list.some(x=>(x.name||"").toLowerCase()===needle) &&
          <button className="btn btn-ghost btn-block" style={{marginTop:12}} onClick={()=>onCreate(q.trim())}>
            <Icon d={ICONS.plus} size={15}/> Create "{q.trim()}"
          </button>}
        <div className="list">
          {list.map(x => (
            <button key={x.id} className="item" onClick={()=>onPick(x)}>
              <div className="item-body">
                <div className="item-title">{x.name}</div>
                <div className="item-meta">
                  <span className={"chip "+typeClass(x.type)}>{x.type}</span>
                  {x.muscleGroup && <span className="chip">{x.muscleGroup}</span>}
                  {notHere(x) && <span className="chip red">not at this gym</span>}
                </div>
              </div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* Full-screen workout editor. active (no endedAt): elapsed clock, rest timer,
   Finish. Finished: view/edit history + delete. */
function WorkoutEditor({ store, workoutId, onClose, onFinish, onDelete }){
  const workout = (store.data.workouts||[]).find(w=>w.id===workoutId);
  const [picker, setPicker] = useState(false);
  const [restUntil, setRestUntil] = useState(0);
  const [, setTick] = useState(0);
  useEffect(()=>{ const iv=setInterval(()=>setTick(t=>t+1), 1000); return ()=>clearInterval(iv); },[]);
  if(!workout) return null;

  const active = !workout.endedAt;
  const units = store.cfg.units || "lb";
  const restSecs = store.cfg.restSecs===undefined ? 90 : store.cfg.restSecs;

  const patch = (p) => {
    store.saveCollection("workouts",
      (store.data.workouts||[]).map(w => w.id===workout.id ? { ...w, ...p, updatedAt: nowISO() } : w));
  };
  const updateEntry = (id, fn) => patch({ entries: (workout.entries||[]).map(e => e.id===id ? fn(e) : e) });
  const removeEntry = (id) => {
    const e = (workout.entries||[]).find(x=>x.id===id);
    if(e && ((e.sets||[]).length || e.cardio) && !confirm("Remove "+e.name+" and its logged sets?")) return;
    patch({ entries: (workout.entries||[]).filter(x=>x.id!==id) });
  };
  const addExercise = (x) => {
    patch({ entries: [...(workout.entries||[]), { id: uid(), exerciseId: x.id, name: x.name, type: x.type, sets: [], cardio: null }] });
    setPicker(false);
  };
  const createAndAdd = (name) => {
    const x = { id: uid(), name, type:"strength", muscleGroup:"Full body", equipment:"none",
                notes:"", custom:true, createdAt: nowISO(), updatedAt: nowISO() };
    store.saveCollection("exercises", [x, ...(store.data.exercises||[])]);
    addExercise(x);
  };
  const onSetLogged = () => {
    if(active && restSecs>0) setRestUntil(Date.now() + restSecs*1000);
    try{ if(navigator.vibrate) navigator.vibrate(15); }catch(e){}
  };

  // "Same as last time": most recent OTHER workout containing this exercise.
  const lastPerf = (exerciseId) => {
    const ws = (store.data.workouts||[]).slice()
      .sort((a,b)=>String(b.startedAt||"").localeCompare(String(a.startedAt||"")));
    for(const w of ws){
      if(w.id===workout.id) continue;
      const e = (w.entries||[]).find(x=>x.exerciseId===exerciseId && (x.sets||[]).length);
      if(e){
        const best = e.sets.reduce((a,b)=>((Number(b.reps)||0)*(Number(b.weight)||0) > (Number(a.reps)||0)*(Number(a.weight)||0) ? b : a), e.sets[0]);
        return { sets: e.sets, best };
      }
    }
    return null;
  };

  const elapsed = active
    ? fmtClock((Date.now() - new Date(workout.startedAt).getTime())/1000)
    : null;
  const restLeft = Math.ceil((restUntil - Date.now())/1000);
  const gym = (store.gyms||[]).find(g=>g.id===workout.gymId) || null;
  const setGym = (g) => {
    patch({ gymId: g ? g.id : null, gymName: g ? g.name : null });
    if(g) store.saveCfg({ ...store.cfg, lastGymId: g.id });
  };

  return (
    <div className="editor">
      <div className="editor-inner">
        <div className="editor-top">
          <button className="icon-btn" onClick={onClose} aria-label="Back"><Icon d={ICONS.back} size={20}/></button>
          <div className="editor-title">
            {/* Save on blur, not per keystroke - each save is a whole-collection PUT. */}
            <input defaultValue={workout.name||""} onBlur={e=>{ if(e.target.value!==workout.name) patch({name:e.target.value}); }}
              placeholder="Workout name" />
            <div className="elapsed">
              {active ? elapsed+" elapsed" : fmtDate(workout.date) + (workout.durationMin>0 ? " - "+workout.durationMin+" min" : "")}
            </div>
          </div>
          {active &&
            <button className="btn btn-primary btn-sm" style={{flex:"0 0 auto"}}
              onClick={()=>{ if(confirm("Finish this workout?")) onFinish(workout); }}>
              Finish
            </button>}
        </div>

        {(store.gyms||[]).length>0 &&
          <div className="pills-row">
            <button className={"pill "+(!workout.gymId?"on":"")} onClick={()=>setGym(null)}>No gym</button>
            {(store.gyms||[]).map(g =>
              <button key={g.id} className={"pill "+(workout.gymId===g.id?"on":"")} onClick={()=>setGym(g)}>
                {g.name}
              </button>)}
          </div>}

        {(workout.entries||[]).length===0 &&
          <div className="empty" style={{padding:"36px 20px"}}>
            <h3 className="title-sm">{active ? "Add your first exercise" : "Empty workout"}</h3>
            {active && <p>Pick from the library; sets pre-fill from your last session.</p>}
          </div>}

        {(workout.entries||[]).map(e => (
          <EntryCard key={e.id} entry={e} prev={lastPerf(e.exerciseId)} units={units} active={active}
            onUpdate={fn=>updateEntry(e.id, fn)} onRemove={()=>removeEntry(e.id)} onSetLogged={onSetLogged} />
        ))}

        {active &&
          <button className="btn btn-ghost btn-block" style={{marginTop:14}} onClick={()=>setPicker(true)}>
            <Icon d={ICONS.plus} size={15}/> Add exercise
          </button>}

        {!active &&
          <button className="btn btn-danger btn-block" style={{marginTop:18}}
            onClick={()=>{ if(confirm("Delete this workout from your history?")) onDelete(workout.id); }}>
            Delete workout
          </button>}
      </div>

      {active && restLeft>0 &&
        <button className="rest" onClick={()=>setRestUntil(0)}>
          Rest {fmtClock(restLeft)} <Icon d={ICONS.x} size={14}/>
        </button>}

      {picker &&
        <ExercisePicker store={store} gym={gym} onPick={addExercise} onCreate={createAndAdd} onClose={()=>setPicker(false)} />}
    </div>
  );
}

/* ============================================================
   AI HISTORY IMPORT - paste workout history from anywhere, the relay
   (task import_history -> Sonnet) organizes it into structured workouts,
   the user REVIEWS before anything saves (PriorityCaptain organizer
   pattern). Scan output is a draft, never an auto-commit.
   ============================================================ */
const normName = s => String(s||"").toLowerCase().replace(/[^a-z0-9]/g,"");

function importSystemPrompt(units, libraryNames){
  return "You organize pasted workout history into strict JSON. Return ONLY a JSON object, " +
    "no prose and no markdown fences, shaped exactly like this: " +
    '{"workouts":[{"date":"YYYY-MM-DD or null","name":"short title","notes":"",' +
    '"entries":[{"exercise":"name","type":"strength|cardio|mobility",' +
    '"sets":[{"reps":N,"weight":N}] (strength only, else null),' +
    '"cardio":{"minutes":N,"distance":N} (cardio/mobility only, else null)}]}],' +
    '"skipped":["input lines you could not interpret"]}. ' +
    "Rules: weights are in " + units + " unless the text clearly says otherwise (convert if needed); " +
    "bodyweight movements use weight 0; numbers are plain with no units. " +
    "When an exercise clearly matches one of the user's library names, use the library name EXACTLY. " +
    "Library: " + libraryNames.join(", ") + ". " +
    "Otherwise use a clean title-case name. Use dates from the text; null when absent. " +
    "Split distinct days into separate workouts. Never invent workouts, exercises, or sets that are not in the text.";
}

function ImportLayer({ store, onClose, onImported }){
  const [phase, setPhase] = useState("paste");   // paste | busy | review
  const [text, setText] = useState("");
  const [err, setErr] = useState("");
  const [parsed, setParsed] = useState([]);
  const [skipped, setSkipped] = useState([]);
  const units = store.cfg.units || "lb";

  const organize = async () => {
    const t = text.trim();
    if(t.length < 10){ setErr("Paste some workout history first."); return; }
    setErr(""); setPhase("busy");
    try{
      const names = (store.data.exercises||[]).map(x=>x.name);
      const out = await aiRelay("import_history",
        [{ role:"user", content: t.slice(0, 20000) }],
        { system: importSystemPrompt(units, names), maxTokens: 16000 });
      let obj;
      try{ obj = JSON.parse(stripFences(out)); }
      catch(e){ throw new Error("Couldn't read the result. Try pasting a smaller chunk."); }
      const ws = Array.isArray(obj && obj.workouts) ? obj.workouts : [];
      if(!ws.length) throw new Error("No workouts found in that text. Try a different chunk.");
      const lib = {}; (store.data.exercises||[]).forEach(x=>{ lib[normName(x.name)] = x; });
      const review = ws.map(w => ({
        include: true,
        date: (typeof w.date==="string" && /^\d{4}-\d{2}-\d{2}$/.test(w.date)) ? w.date : todayStr(),
        name: (w.name||"Imported workout").slice(0,60),
        notes: (w.notes||"").slice(0,500),
        entries: (Array.isArray(w.entries)?w.entries:[]).map(e => {
          const type = EXERCISE_TYPES.includes(e.type) ? e.type : "strength";
          const sets = (type==="strength" && Array.isArray(e.sets))
            ? e.sets.map(s=>({ reps: Math.max(0, Math.min(999, Math.round(Number(s.reps)||0))),
                               weight: Math.max(0, Math.min(2000, Math.round((Number(s.weight)||0)*100)/100)) }))
                    .filter(s=>s.reps>0)
            : [];
          const cardio = (type!=="strength" && e.cardio && Number(e.cardio.minutes)>0)
            ? { minutes: Math.round(Number(e.cardio.minutes)), distance: Math.max(0, Number(e.cardio.distance)||0), unit: units==="kg"?"km":"mi" }
            : null;
          const name = String(e.exercise||"Exercise").slice(0,60);
          return { name, type, sets, cardio, matched: !!lib[normName(name)] };
        }).filter(e => e.sets.length || e.cardio),
      })).filter(w => w.entries.length);
      if(!review.length) throw new Error("Nothing usable was parsed. Try a different chunk.");
      setParsed(review);
      setSkipped(Array.isArray(obj.skipped) ? obj.skipped.slice(0,20) : []);
      setPhase("review");
      log("IMPORT","parsed "+review.length+" workouts");
    }catch(e){
      setErr(e.message||"Import failed."); setPhase("paste");
      log("ERROR","import: "+e.message);
    }
  };

  const toggle = (i) => setParsed(p => p.map((w,j)=> j===i ? {...w, include:!w.include} : w));
  const setDate = (i, d) => setParsed(p => p.map((w,j)=> j===i ? {...w, date:d} : w));

  const importAll = () => {
    const inc = parsed.filter(p=>p.include);
    if(!inc.length){ setErr("Everything is set to skip."); return; }
    // 1. Create any exercises the library doesn't have yet (dedup by name).
    const lib = {}; (store.data.exercises||[]).forEach(x=>{ lib[normName(x.name)] = x; });
    const created = [];
    inc.forEach(w => w.entries.forEach(e => {
      const key = normName(e.name);
      if(!lib[key]){
        const x = { id: uid(), name: e.name, type: e.type, muscleGroup: "Full body",
                    equipment: "none", notes: "", custom: true,
                    createdAt: nowISO(), updatedAt: nowISO() };
        lib[key] = x; created.push(x);
      }
    }));
    if(created.length) store.saveCollection("exercises", [...created, ...(store.data.exercises||[])]);
    // 2. Create the workouts as FINISHED history (endedAt set; duration unknown).
    const workouts = inc.map(w => ({
      id: uid(), name: w.name, date: w.date,
      startedAt: w.date + "T12:00:00.000Z", endedAt: w.date + "T12:00:00.000Z",
      durationMin: 0, notes: w.notes, imported: true,
      entries: w.entries.map(e => ({
        id: uid(), exerciseId: lib[normName(e.name)].id, name: lib[normName(e.name)].name,
        type: e.type, sets: e.sets, cardio: e.cardio,
      })),
    }));
    store.saveCollection("workouts", [...workouts, ...(store.data.workouts||[])]);
    log("IMPORT","imported "+workouts.length+" workouts, "+created.length+" new exercises");
    onImported(workouts.length, created.length);
  };

  return (
    <div className="layer">
      <div className="layer-inner">
        <div className="layer-top">
          <button className="icon-btn" onClick={onClose} aria-label="Back"><Icon d={ICONS.back} size={20}/></button>
          <h2>Import history</h2>
        </div>

        {phase==="paste" && <>
          <p className="hint" style={{marginTop:4}}>
            Paste workout history from anywhere - a notes app, a spreadsheet, another
            app's export. Any format works; the AI organizes it and you review
            everything before it saves. For long histories, paste a few weeks at a time.
          </p>
          {err && <div className="auth-msg err" style={{marginTop:10}}>{err}</div>}
          <textarea className="textarea" style={{minHeight:220,marginTop:12}} value={text}
            onChange={e=>setText(e.target.value)}
            placeholder={"e.g.\nMon 7/14 - push day\nbench 3x8 @ 185\nohp 135 x8x8x6\n20 min bike"} />
          <button className="btn btn-primary btn-block" style={{marginTop:12}} onClick={organize}>
            Organize with AI
          </button>
        </>}

        {phase==="busy" &&
          <div className="empty" style={{padding:"60px 20px"}}>
            <span className="spin spin-lg" style={{margin:"0 auto 16px",display:"block"}}></span>
            <p>Reading your history...</p>
          </div>}

        {phase==="review" && <>
          <p className="hint" style={{marginTop:4}}>
            Review before saving. Tap a workout to include or skip it; fix any dates.
            Exercises marked "new" will be added to your library.
          </p>
          {err && <div className="auth-msg err" style={{marginTop:10}}>{err}</div>}
          {parsed.map((w,i) => (
            <div key={i} className="entry" style={{opacity: w.include?1:.45}}>
              <div className="entry-head">
                <div style={{flex:1,minWidth:0}}>
                  <div className="entry-name">{w.name}</div>
                  <input className="input" type="date" value={w.date} style={{marginTop:8,maxWidth:180,padding:"8px 10px"}}
                    onChange={e=>setDate(i, e.target.value||todayStr())} />
                </div>
                <button className={"pill "+(w.include?"on":"")} style={{flex:"0 0 auto"}} onClick={()=>toggle(i)}>
                  {w.include ? "Include" : "Skip"}
                </button>
              </div>
              {w.entries.map((e,j) => (
                <div key={j} className="set-row" style={{cursor:"default"}}>
                  <span className="set-main" style={{fontWeight:500}}>
                    {e.name}
                    {e.sets.length>0 && " - "+e.sets.length+" set"+(e.sets.length===1?"":"s")+
                      " (top "+e.sets.reduce((a,b)=>b.reps*b.weight>=a.reps*a.weight?b:a,e.sets[0]).reps+
                      " x "+fmtW(e.sets.reduce((a,b)=>b.reps*b.weight>=a.reps*a.weight?b:a,e.sets[0]).weight)+" "+units+")"}
                    {e.cardio && " - "+e.cardio.minutes+" min"+(e.cardio.distance>0?" / "+fmtW(e.cardio.distance)+" "+e.cardio.unit:"")}
                  </span>
                  {!e.matched && <span className="chip violet" style={{flex:"0 0 auto"}}>new</span>}
                </div>
              ))}
            </div>
          ))}
          {skipped.length>0 &&
            <div className="card" style={{marginTop:12}}>
              <div className="subtle" style={{marginBottom:6}}>Couldn't interpret:</div>
              {skipped.map((s,i)=><div key={i} className="hint">{String(s).slice(0,120)}</div>)}
            </div>}
          <button className="btn btn-primary btn-block" style={{marginTop:14}} onClick={importAll}>
            Import {parsed.filter(p=>p.include).length} workout{parsed.filter(p=>p.include).length===1?"":"s"}
          </button>
          <button className="btn btn-ghost btn-block" style={{marginTop:8}} onClick={()=>{ setPhase("paste"); setErr(""); }}>
            Back to paste
          </button>
        </>}
      </div>
    </div>
  );
}

function RoutinesScreen({ store }){
  const routines = store.data.routines || [];
  if(!routines.length){
    return (
      <div className="empty">
        <div className="glyph">&gt;</div>
        <h3 className="title-sm">Reusable routines</h3>
        <p>Build a routine once - push day, 5x5, couch-to-5k - then start a pre-filled workout from it in one tap. Coming soon.</p>
      </div>
    );
  }
  return (
    <div className="list">
      {routines.map(r => (
        <div key={r.id} className="item">
          <div className="item-body">
            <div className="item-title">{r.name}</div>
            <div className="item-meta">
              {Array.isArray(r.items) && <span className="chip amber">{r.items.length} exercise{r.items.length===1?"":"s"}</span>}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function ProgressScreen(){
  return (
    <div className="empty">
      <div className="glyph">^</div>
      <h3 className="title-sm">Progress</h3>
      <p>Per-exercise history, PRs, and weekly volume - built from your logged workouts. Coming soon.</p>
    </div>
  );
}

function SettingsScreen({ store, onCheckUpdate, updateState, updMsg }){
  const [showLog, setShowLog] = useState(false);
  const setUnits = (u) => store.saveCfg({ ...store.cfg, units: u });
  return (
    <div>
      <div className="set-group">Account</div>
      <div className="card">
        <div className="subtle" style={{marginBottom:10}}>{store.authEmail || "Signed in"}</div>
        <button className="btn btn-ghost btn-block" onClick={()=>store.signOut()}>Sign out</button>
      </div>

      <div className="set-group">Preferences</div>
      <div className="card">
        <div className="subtle">Weight units</div>
        <div className="pills">
          <button className={"pill "+(store.cfg.units==="lb"?"on":"")} onClick={()=>setUnits("lb")}>lb</button>
          <button className={"pill "+(store.cfg.units==="kg"?"on":"")} onClick={()=>setUnits("kg")}>kg</button>
        </div>
        <div className="subtle" style={{marginTop:14}}>Rest timer after each set</div>
        <div className="pills">
          {[0,60,90,120].map(s => (
            <button key={s} className={"pill "+((store.cfg.restSecs===undefined?90:store.cfg.restSecs)===s?"on":"")}
              onClick={()=>store.saveCfg({ ...store.cfg, restSecs: s })}>
              {s===0 ? "Off" : s+"s"}
            </button>
          ))}
        </div>
      </div>

      <div className="set-group">About</div>
      <div className="card">
        <div className="updrow">
          <span className="subtle">FitnessCaptain v{APP_VERSION} (build {BUILD})</span>
        </div>
        <div className="updrow" style={{marginTop:8}}>
          {updateState==="checking"
            ? <span className="spin"></span>
            : <button className="btn btn-ghost btn-sm" onClick={()=>onCheckUpdate(true)}><Icon d={ICONS.refresh} size={14}/> Check for updates</button>}
          {updMsg && <span className="subtle">{updMsg}</span>}
        </div>
      </div>

      <div className="set-group">Diagnostics</div>
      <div className="card">
        <button className="btn btn-ghost btn-block" onClick={()=>setShowLog(s=>!s)}>{showLog ? "Hide" : "Show"} log</button>
        {showLog &&
          <div className="log" style={{marginTop:12}}>
            {LOG.slice(-120).map((l,i)=>(
              <div key={i} className={l.tag==="ERROR"?"err":""}>
                <span className="t">{l.t} </span><span className="tag">[{l.tag}]</span> {l.msg}
              </div>
            ))}
          </div>}
      </div>
    </div>
  );
}

/* ============================================================
   APP SHELL
   ============================================================ */
const TABS = [
  { key:"workouts",  label:"Workouts",  eyebrow:"Train",    icon:ICONS.dumbbell },
  { key:"gyms",      label:"Gyms",      eyebrow:"Places",   icon:ICONS.pin },
  { key:"exercises", label:"Exercises", eyebrow:"Library",  icon:ICONS.book },
  { key:"routines",  label:"Routines",  eyebrow:"Plan",     icon:ICONS.repeat },
  { key:"progress",  label:"Progress",  eyebrow:"Momentum", icon:ICONS.chart },
];

function App(){
  const store = useStore();
  const [tab, setTab] = useState("workouts");
  const [inSettings, setInSettings] = useState(false);
  const [exSheet, setExSheet] = useState(null);   // null | {exercise: rec|null}
  const [workoutId, setWorkoutId] = useState(null);   // open workout editor
  const [importer, setImporter] = useState(false);    // AI history import layer
  const [gymSheet, setGymSheet] = useState(null);     // null | {gym: rec|null}
  const [gymView, setGymView] = useState(null);       // open gym place page (id)

  // ---- gym CRUD ----
  const saveGym = (rec) => {
    const gyms = store.gyms || [];
    const exists = gyms.some(g => g.id === rec.id);
    store.saveGyms(exists ? gyms.map(g => g.id===rec.id ? rec : g) : [...gyms, rec]);
    setGymSheet(null);
    showToast(exists ? "Gym updated" : "Gym added");
  };
  const deleteGym = (id) => {
    store.saveGyms((store.gyms||[]).filter(g => g.id !== id));
    if(store.cfg.lastGymId === id) store.saveCfg({ ...store.cfg, lastGymId: null });
    setGymSheet(null); setGymView(null);
    showToast("Gym deleted");
  };
  const [toast, setToast] = useState("");
  const toastRef = useRef();
  const showToast = (m) => { setToast(m); clearTimeout(toastRef.current); toastRef.current = setTimeout(()=>setToast(""), 2200); };

  // ---- workout lifecycle ----
  // atGym (optional) starts the workout AT that gym (from a place page).
  // Guarded because plain onClick handlers pass an event object here.
  const startWorkout = (atGym) => {
    const gymArg = (atGym && atGym.id && atGym.name) ? atGym : null;
    const existing = (store.data.workouts||[]).find(w=>!w.endedAt);
    if(existing){
      // One active at a time; "start here" retargets its gym.
      if(gymArg && existing.gymId !== gymArg.id){
        store.saveCollection("workouts", (store.data.workouts||[]).map(w =>
          w.id===existing.id ? { ...w, gymId: gymArg.id, gymName: gymArg.name, updatedAt: nowISO() } : w));
      }
      setWorkoutId(existing.id); return;
    }
    const gym = gymArg || (store.gyms||[]).find(g=>g.id===store.cfg.lastGymId) || null;
    const w = { id: uid(), name: dayPartName(), date: todayStr(), startedAt: nowISO(),
                endedAt: null, durationMin: 0, notes: "", entries: [],
                gymId: gym ? gym.id : null, gymName: gym ? gym.name : null };
    store.saveCollection("workouts", [w, ...(store.data.workouts||[])]);
    if(gymArg) store.saveCfg({ ...store.cfg, lastGymId: gymArg.id });
    setWorkoutId(w.id);
  };
  const startHere = (g) => { setGymView(null); setTab("workouts"); startWorkout(g); };
  const finishWorkout = (w) => {
    const mins = Math.max(1, Math.round((Date.now() - new Date(w.startedAt).getTime())/60000));
    store.saveCollection("workouts",
      (store.data.workouts||[]).map(x => x.id===w.id ? { ...x, endedAt: nowISO(), durationMin: mins, updatedAt: nowISO() } : x));
    setWorkoutId(null);
    showToast("Workout saved - "+mins+" min");
  };
  const deleteWorkout = (id) => {
    store.saveCollection("workouts", (store.data.workouts||[]).filter(w => w.id !== id));
    setWorkoutId(null);
    showToast("Workout deleted");
  };

  // ---- exercise CRUD ----
  const saveExercise = (rec) => {
    const list = store.data.exercises || [];
    const exists = list.some(x => x.id === rec.id);
    store.saveCollection("exercises", exists ? list.map(x => x.id===rec.id ? rec : x) : [rec, ...list]);
    setExSheet(null);
    showToast(exists ? "Exercise updated" : "Exercise added");
  };
  const deleteExercise = (id) => {
    store.saveCollection("exercises", (store.data.exercises||[]).filter(x => x.id !== id));
    setExSheet(null);
    showToast("Exercise deleted");
  };

  // --- PWA self-update: fetch the deployed index.html (no-store), read its
  // BUILD stamp, offer a one-tap refresh when a genuinely newer build is live.
  // Checks on launch AND resume AND a periodic timer - installed PWAs are
  // usually RESUMED, not cold-launched (portable fix from MenuCaptain).
  const [update, setUpdate] = useState(null);   // { build } of a newer deployed build, else null
  const [updState, setUpdState] = useState("");
  const [updMsg, setUpdMsg] = useState("");
  const updTimer = useRef(null);
  const flashUpd = useCallback((msg)=>{ setUpdMsg(msg); if(updTimer.current) clearTimeout(updTimer.current); updTimer.current = setTimeout(()=>setUpdMsg(""), 4000); },[]);
  const checkUpdate = useCallback(async (manual=false)=>{
    if(manual){ setUpdState("checking"); setUpdMsg(""); }
    try{
      const res = await fetch(location.pathname + "?_=" + Date.now(), { cache:"no-store" });
      if(!res.ok){ log("UPDATE","check http "+res.status); if(manual){ setUpdState(""); flashUpd("Couldn't check - are you online?"); } return; }
      const html = await res.text();
      const mb = html.match(/const BUILD = "([^"]+)";/);
      const remote = mb && mb[1];
      if(remote && buildIsNewer(remote, BUILD)){
        log("UPDATE","newer build live: "+remote);
        setUpdate({ build: remote });
        if(manual) setUpdState("");
      } else {
        log("UPDATE","up to date (v"+APP_VERSION+", "+BUILD+")");
        setUpdate(null);
        if(manual){ setUpdState(""); flashUpd("You're on the latest (v"+APP_VERSION+")"); }
      }
    }catch(e){ log("UPDATE","check failed: "+e.message); if(manual){ setUpdState(""); flashUpd("Update check failed"); } }
  },[flashUpd]);
  useEffect(()=>{
    let last=0; const GAP=60*1000;
    const maybe=()=>{ const now=Date.now(); if(now-last<GAP) return; last=now; checkUpdate(false); };
    const t=setTimeout(maybe, 1500);                       // initial launch check
    const onVis=()=>{ if(document.visibilityState==="visible") maybe(); };
    document.addEventListener("visibilitychange", onVis);
    const iv=setInterval(maybe, 20*60*1000);               // periodic while open
    return ()=>{ clearTimeout(t); clearInterval(iv); document.removeEventListener("visibilitychange", onVis); };
  },[checkUpdate]);

  // Service worker: app-shell offline caching. Registered with a RELATIVE path
  // so the scope is /fitnesscaptain-app/ on GitHub Pages ("/sw.js" would 404).
  // Deliberately no web manifest (template decision): without one, Add to Home
  // Screen uses the current page URL as the launch URL.
  useEffect(()=>{
    if(!("serviceWorker" in navigator)) return;
    const onLoad = ()=>{ navigator.serviceWorker.register("sw.js")
      .then(()=>log("SW","registered"))
      .catch(e=>log("SW","register failed: "+(e&&e.message))); };
    if(document.readyState==="complete") onLoad(); else window.addEventListener("load", onLoad);
    return ()=>window.removeEventListener("load", onLoad);
  },[]);

  // Apply by navigating to a build-stamped URL so iOS can't serve cached HTML.
  // Wipe the SW caches first so the new build is never masked by a cached shell.
  function applyUpdate(){
    const stamp=(update&&update.build)||String(Date.now());
    log("UPDATE","applying -> "+stamp);
    try{ if(navigator.serviceWorker && navigator.serviceWorker.controller) navigator.serviceWorker.controller.postMessage("clearCache"); }catch(_){}
    window.location.replace(location.pathname + "?u=" + encodeURIComponent(stamp));
  }

  if(!store.authReady){
    return <div className="app"><div className="spin spin-lg"></div></div>;
  }
  if(store.recovery){
    return <SetPassword store={store} />;
  }
  if(!store.authed){
    return <AuthScreen store={store} />;
  }

  const activeTab = TABS.find(t=>t.key===tab) || TABS[0];

  return (
    <div className="app">
      {update &&
        <button className="update-bar" onClick={applyUpdate}>
          <span>A new version of FitnessCaptain is ready.</span>
          <span className="update-go">Update</span>
        </button>}

      <div className="topbar">
        <div className="topbar-row">
          <div>
            <div className="eyebrow">{inSettings ? "Configure" : activeTab.eyebrow}</div>
            <h1 className="title">{inSettings ? "Settings" : activeTab.label}</h1>
          </div>
          <button className="icon-btn" onClick={()=>setInSettings(s=>!s)} aria-label="Settings">
            <Icon d={inSettings ? ICONS.back : ICONS.gear} size={21}/>
          </button>
        </div>
        <div className={"sync "+store.sync}>
          <span className="dot"></span>
          {store.sync==="idle" && "All changes saved"}
          {store.sync==="busy" && "Syncing..."}
          {store.sync==="pending" && "Offline - will sync"}
          {store.sync==="error" && (store.syncMsg || "Sync error")}
        </div>
      </div>

      <div className="screen">
        {inSettings
          ? <SettingsScreen store={store} onCheckUpdate={checkUpdate} updateState={updState} updMsg={updMsg} />
          : <>
              {tab==="workouts"  && <WorkoutsScreen store={store} onStart={startWorkout} onOpen={(w)=>setWorkoutId(w.id)} onImport={()=>setImporter(true)} />}
              {tab==="gyms"      && <GymsScreen store={store} onOpen={(g)=>setGymView(g.id)} onAdd={()=>setGymSheet({gym:null})} />}
              {tab==="exercises" && <ExercisesScreen store={store} onAdd={()=>setExSheet({exercise:null})} onEdit={(x)=>setExSheet({exercise:x})} />}
              {tab==="routines"  && <RoutinesScreen store={store} />}
              {tab==="progress"  && <ProgressScreen />}
            </>}
      </div>

      {!inSettings && tab==="workouts" && !workoutId &&
        <button className="fab" onClick={()=>startWorkout()} aria-label="Start workout"><Icon d={ICONS.plus} size={26}/></button>}
      {!inSettings && tab==="gyms" && !gymSheet && !gymView &&
        <button className="fab" onClick={()=>setGymSheet({gym:null})} aria-label="Add gym"><Icon d={ICONS.plus} size={26}/></button>}
      {!inSettings && tab==="exercises" && !exSheet &&
        <button className="fab" onClick={()=>setExSheet({exercise:null})} aria-label="Add exercise"><Icon d={ICONS.plus} size={26}/></button>}

      {exSheet &&
        <ExerciseSheet exercise={exSheet.exercise} onSave={saveExercise} onDelete={deleteExercise} onClose={()=>setExSheet(null)} />}

      {gymView &&
        <GymDetail store={store} gymId={gymView} onEdit={(g)=>setGymSheet({gym:g})}
          onStartHere={startHere} onClose={()=>setGymView(null)} />}

      {gymSheet &&
        <GymSheet gym={gymSheet.gym} onSave={saveGym} onDelete={deleteGym} onClose={()=>setGymSheet(null)} />}

      {workoutId &&
        <WorkoutEditor key={workoutId} store={store} workoutId={workoutId}
          onClose={()=>setWorkoutId(null)} onFinish={finishWorkout} onDelete={deleteWorkout} />}

      {importer &&
        <ImportLayer store={store} onClose={()=>setImporter(false)}
          onImported={(nw, nx)=>{ setImporter(false);
            showToast("Imported "+nw+" workout"+(nw===1?"":"s")+(nx>0 ? " + "+nx+" new exercise"+(nx===1?"":"s") : "")); }} />}

      {!inSettings &&
        <nav className="nav">
          {TABS.map(t => (
            <button key={t.key} className={"nav-btn "+(tab===t.key?"on":"")} onClick={()=>setTab(t.key)}>
              <Icon d={t.icon} size={22}/>
              {t.label}
            </button>
          ))}
        </nav>}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

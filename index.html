    <div className="layer">
      <div className="layer-inner">
        <div className="layer-top">
          <button className="icon-btn" onClick={onClose} aria-label="Back"><Icon d={ICONS.back} size={20}/></button>
          <h2>Add exercise</h2>
        </div>
        {gym && Array.isArray(gym.equipment) && gym.equipment.length>0 &&
          <div className="hint" style={{marginTop:2}}>Showing availability at {gym.name}.</div>}
        <div className="search-wrap" style={{marginTop:4}}>
          <input className="input" value={q} onChange={e=>setQ(e.target.value)}
            placeholder="Search the library" autoCapitalize="off" autoCorrect="off" autoFocus />
          {q &&
            <button className="search-x" onClick={()=>setQ("")} aria-label="Clear search">
              <Icon d={ICONS.x} size={16}/>
            </button>}
        </div>
        <div className="pills-row">
          {["all"].concat(MUSCLE_GROUPS).map(g =>
            <button key={g} className={"pill "+(groupF===g?"on":"")} onClick={()=>setGroupF(g)}>
              {g==="all" ? "All muscles" : g}
            </button>)}
        </div>
        {q.trim().length>1 && !list.some(x=>(x.name||"").toLowerCase()===needle) &&
          <button className="btn btn-ghost btn-block" style={{marginTop:12}} onClick={()=>onCreate(q.trim())}>
            <Icon d={ICONS.plus} size={15}/> Create "{q.trim()}"
          </button>}
        <div className="list">
          {list.map(x => (
            <button key={x.id} className="item" onClick={()=>onPick(x)}>
              <div className="item-body">
                <div className="item-title">{x.name}</div>
                <div className="item-meta">
                  <span className={"chip "+typeClass(x.type)}>{x.type}</span>
                  {x.muscleGroup && <span className="chip">{x.muscleGroup}</span>}
                  {notHere(x) && <span className="chip red">not at this gym</span>}
                </div>
              </div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* Full-screen workout editor. active (no endedAt): elapsed clock, rest timer,
   Finish. Finished: view/edit history + delete. */
function WorkoutEditor({ store, workoutId, onClose, onFinish, onDelete, onSaveAsRoutine }){
  const workout = (store.data.workouts||[]).find(w=>w.id===workoutId);
  const [picker, setPicker] = useState(false);
  const [restUntil, setRestUntil] = useState(0);
  const [, setTick] = useState(0);
  useEffect(()=>{ const iv=setInterval(()=>setTick(t=>t+1), 1000); return ()=>clearInterval(iv); },[]);
  if(!workout) return null;

  const active = !workout.endedAt;
  const units = store.cfg.units || "lb";
  const restSecs = store.cfg.restSecs===undefined ? 90 : store.cfg.restSecs;

  const patch = (p) => {
    store.saveCollection("workouts",
      (store.data.workouts||[]).map(w => w.id===workout.id ? { ...w, ...p, updatedAt: nowISO() } : w));
  };
  const updateEntry = (id, fn) => patch({ entries: (workout.entries||[]).map(e => e.id===id ? fn(e) : e) });
  const removeEntry = (id) => {
    const e = (workout.entries||[]).find(x=>x.id===id);
    if(e && ((e.sets||[]).length || e.cardio) && !confirm("Remove "+e.name+" and its logged sets?")) return;
    patch({ entries: (workout.entries||[]).filter(x=>x.id!==id) });
  };
  const addExercise = (x) => {
    patch({ entries: [...(workout.entries||[]), { id: uid(), exerciseId: x.id, name: x.name, type: x.type, sets: [], cardio: null }] });
    setPicker(false);
  };
  const createAndAdd = (name) => {
    const x = { id: uid(), name, type:"strength", muscleGroup:"Full body", equipment:"none",
                notes:"", custom:true, createdAt: nowISO(), updatedAt: nowISO() };
    store.saveCollection("exercises", [x, ...(store.data.exercises||[])]);
    addExercise(x);
  };
  const onSetLogged = () => {
    if(active && restSecs>0) setRestUntil(Date.now() + restSecs*1000);
    try{ if(navigator.vibrate) navigator.vibrate(15); }catch(e){}
  };

  // "Same as last time": most recent OTHER workout containing this exercise.
  const lastPerf = (exerciseId) => {
    const ws = (store.data.workouts||[]).slice()
      .sort((a,b)=>String(b.startedAt||"").localeCompare(String(a.startedAt||"")));
    for(const w of ws){
      if(w.id===workout.id) continue;
      const e = (w.entries||[]).find(x=>x.exerciseId===exerciseId && (x.sets||[]).length);
      if(e){
        const best = e.sets.reduce((a,b)=>((Number(b.reps)||0)*(Number(b.weight)||0) > (Number(a.reps)||0)*(Number(a.weight)||0) ? b : a), e.sets[0]);
        return { sets: e.sets, best };
      }
    }
    return null;
  };

  const elapsed = active
    ? fmtClock((Date.now() - new Date(workout.startedAt).getTime())/1000)
    : null;
  const restLeft = Math.ceil((restUntil - Date.now())/1000);
  const gym = (store.gyms||[]).find(g=>g.id===workout.gymId) || null;
  const setGym = (g) => {
    patch({ gymId: g ? g.id : null, gymName: g ? g.name : null });
    if(g) store.saveCfg({ ...store.cfg, lastGymId: g.id });
  };

  return (
    <div className="editor">
      <div className="editor-inner">
        <div className="editor-top">
          <button className="icon-btn" onClick={onClose} aria-label="Back"><Icon d={ICONS.back} size={20}/></button>
          <div className="editor-title">
            {/* Save on blur, not per keystroke - each save is a whole-collection PUT. */}
            <input defaultValue={workout.name||""} onBlur={e=>{ if(e.target.value!==workout.name) patch({name:e.target.value}); }}
              placeholder="Workout name" />
            <div className="elapsed">
              {active ? elapsed+" elapsed" : fmtDate(workout.date) + (workout.durationMin>0 ? " - "+workout.durationMin+" min" : "")}
            </div>
          </div>
          {active &&
            <button className="btn btn-primary btn-sm" style={{flex:"0 0 auto"}}
              onClick={()=>{ if(confirm("Finish this workout?")) onFinish(workout); }}>
              Finish
            </button>}
        </div>

        {(store.gyms||[]).length>0 &&
          <div className="pills-row">
            <button className={"pill "+(!workout.gymId?"on":"")} onClick={()=>setGym(null)}>No gym</button>
            {(store.gyms||[]).map(g =>
              <button key={g.id} className={"pill "+(workout.gymId===g.id?"on":"")} onClick={()=>setGym(g)}>
                {g.name}
              </button>)}
          </div>}

        {(workout.entries||[]).length===0 &&
          <div className="empty" style={{padding:"36px 20px"}}>
            <h3 className="title-sm">{active ? "Add your first exercise" : "Empty workout"}</h3>
            {active && <p>Pick from the library; sets pre-fill from your last session.</p>}
          </div>}

        {(workout.entries||[]).map(e => {
          const ex = (store.data.exercises||[]).find(x=>x.id===e.exerciseId);
          return (
            <EntryCard key={e.id} entry={e} prev={lastPerf(e.exerciseId)} units={units} active={active}
              howTo={ex && ex.notes ? ex.notes : null}
              onUpdate={fn=>updateEntry(e.id, fn)} onRemove={()=>removeEntry(e.id)} onSetLogged={onSetLogged} />
          );
        })}

        {active &&
          <button className="btn btn-ghost btn-block" style={{marginTop:14}} onClick={()=>setPicker(true)}>
            <Icon d={ICONS.plus} size={15}/> Add exercise
          </button>}

        {!active && (workout.entries||[]).length>0 &&
          <button className="btn btn-ghost btn-block" style={{marginTop:18}} onClick={()=>onSaveAsRoutine(workout)}>
            Save as routine
          </button>}
        {!active &&
          <button className="btn btn-danger btn-block" style={{marginTop:10}}
            onClick={()=>{ if(confirm("Delete this workout from your history?")) onDelete(workout.id); }}>
            Delete workout
          </button>}
      </div>

      {active && restLeft>0 &&
        <button className="rest" onClick={()=>setRestUntil(0)}>
          Rest {fmtClock(restLeft)} <Icon d={ICONS.x} size={14}/>
        </button>}

      {picker &&
        <ExercisePicker store={store} gym={gym} onPick={addExercise} onCreate={createAndAdd} onClose={()=>setPicker(false)} />}
    </div>
  );
}

/* ============================================================
   AI HISTORY IMPORT - paste workout history from anywhere, the relay
   (task import_history -> Sonnet) organizes it into structured workouts,
   the user REVIEWS before anything saves (PriorityCaptain organizer
   pattern). Scan output is a draft, never an auto-commit.
   ============================================================ */
const normName = s => String(s||"").toLowerCase().replace(/[^a-z0-9]/g,"");

function importSystemPrompt(units, libraryNames){
  return "You organize pasted workout history into strict JSON. Return ONLY a JSON object, " +
    "no prose and no markdown fences, shaped exactly like this: " +
    '{"workouts":[{"date":"YYYY-MM-DD or null","name":"short title","notes":"",' +
    '"entries":[{"exercise":"name","type":"strength|cardio|mobility",' +
    '"sets":[{"reps":N,"weight":N}] (strength only, else null),' +
    '"cardio":{"minutes":N,"distance":N} (cardio/mobility only, else null)}]}],' +
    '"skipped":["input lines you could not interpret"]}. ' +
    "Rules: weights are in " + units + " unless the text clearly says otherwise (convert if needed); " +
    "bodyweight movements use weight 0; numbers are plain with no units. " +
    "When an exercise clearly matches one of the user's library names, use the library name EXACTLY. " +
    "Library: " + libraryNames.join(", ") + ". " +
    "Otherwise use a clean title-case name. Use dates from the text; null when absent. " +
    "Split distinct days into separate workouts. Never invent workouts, exercises, or sets that are not in the text.";
}

function ImportLayer({ store, onClose, onImported }){
  const [phase, setPhase] = useState("paste");   // paste | busy | review
  const [text, setText] = useState("");
  const [err, setErr] = useState("");
  const [parsed, setParsed] = useState([]);
  const [skipped, setSkipped] = useState([]);
  const units = store.cfg.units || "lb";

  const organize = async () => {
    const t = text.trim();
    if(t.length < 10){ setErr("Paste some workout history first."); return; }
    setErr(""); setPhase("busy");
    try{
      const names = (store.data.exercises||[]).map(x=>x.name);
      const out = await aiRelay("import_history",
        [{ role:"user", content: t.slice(0, 20000) }],
        { system: importSystemPrompt(units, names), maxTokens: 16000 });
      let obj;
      try{ obj = JSON.parse(stripFences(out)); }
      catch(e){ throw new Error("Couldn't read the result. Try pasting a smaller chunk."); }
      const ws = Array.isArray(obj && obj.workouts) ? obj.workouts : [];
      if(!ws.length) throw new Error("No workouts found in that text. Try a different chunk.");
      const lib = {}; (store.data.exercises||[]).forEach(x=>{ lib[normName(x.name)] = x; });
      const review = ws.map(w => ({
        include: true,
        date: (typeof w.date==="string" && /^\d{4}-\d{2}-\d{2}$/.test(w.date)) ? w.date : todayStr(),
        name: (w.name||"Imported workout").slice(0,60),
        notes: (w.notes||"").slice(0,500),
        entries: (Array.isArray(w.entries)?w.entries:[]).map(e => {
          const type = EXERCISE_TYPES.includes(e.type) ? e.type : "strength";
          const sets = (type==="strength" && Array.isArray(e.sets))
            ? e.sets.map(s=>({ reps: Math.max(0, Math.min(999, Math.round(Number(s.reps)||0))),
                               weight: Math.max(0, Math.min(2000, Math.round((Number(s.weight)||0)*100)/100)) }))
                    .filter(s=>s.reps>0)
            : [];
          const cardio = (type!=="strength" && e.cardio && Number(e.cardio.minutes)>0)
            ? { minutes: Math.round(Number(e.cardio.minutes)), distance: Math.max(0, Number(e.cardio.distance)||0), unit: units==="kg"?"km":"mi" }
            : null;
          const name = String(e.exercise||"Exercise").slice(0,60);
          return { name, type, sets, cardio, matched: !!lib[normName(name)] };
        }).filter(e => e.sets.length || e.cardio),
      })).filter(w => w.entries.length);
      if(!review.length) throw new Error("Nothing usable was parsed. Try a different chunk.");
      setParsed(review);
      setSkipped(Array.isArray(obj.skipped) ? obj.skipped.slice(0,20) : []);
      setPhase("review");
      log("IMPORT","parsed "+review.length+" workouts");
    }catch(e){
      setErr(e.message||"Import failed."); setPhase("paste");
      log("ERROR","import: "+e.message);
    }
  };

  const toggle = (i) => setParsed(p => p.map((w,j)=> j===i ? {...w, include:!w.include} : w));
  const setDate = (i, d) => setParsed(p => p.map((w,j)=> j===i ? {...w, date:d} : w));

  const importAll = () => {
    const inc = parsed.filter(p=>p.include);
    if(!inc.length){ setErr("Everything is set to skip."); return; }
    // 1. Create any exercises the library doesn't have yet (dedup by name).
    const lib = {}; (store.data.exercises||[]).forEach(x=>{ lib[normName(x.name)] = x; });
    const created = [];
    inc.forEach(w => w.entries.forEach(e => {
      const key = normName(e.name);
      if(!lib[key]){
        const x = { id: uid(), name: e.name, type: e.type, muscleGroup: "Full body",
                    equipment: "none", notes: "", custom: true,
                    createdAt: nowISO(), updatedAt: nowISO() };
        lib[key] = x; created.push(x);
      }
    }));
    if(created.length) store.saveCollection("exercises", [...created, ...(store.data.exercises||[])]);
    // 2. Create the workouts as FINISHED history (endedAt set; duration unknown).
    const workouts = inc.map(w => ({
      id: uid(), name: w.name, date: w.date,
      startedAt: w.date + "T12:00:00.000Z", endedAt: w.date + "T12:00:00.000Z",
      durationMin: 0, notes: w.notes, imported: true,
      entries: w.entries.map(e => ({
        id: uid(), exerciseId: lib[normName(e.name)].id, name: lib[normName(e.name)].name,
        type: e.type, sets: e.sets, cardio: e.cardio,
      })),
    }));
    store.saveCollection("workouts", [...workouts, ...(store.data.workouts||[])]);
    log("IMPORT","imported "+workouts.length+" workouts, "+created.length+" new exercises");
    onImported(workouts.length, created.length);
  };

  return (
    <div className="layer">
      <div className="layer-inner">
        <div className="layer-top">
          <button className="icon-btn" onClick={onClose} aria-label="Back"><Icon d={ICONS.back} size={20}/></button>
          <h2>Import history</h2>
        </div>

        {phase==="paste" && <>
          <p className="hint" style={{marginTop:4}}>
            Paste workout history from anywhere - a notes app, a spreadsheet, another
            app's export. Any format works; the AI organizes it and you review
            everything before it saves. For long histories, paste a few weeks at a time.
          </p>
          {err && <div className="auth-msg err" style={{marginTop:10}}>{err}</div>}
          <textarea className="textarea" style={{minHeight:220,marginTop:12}} value={text}
            onChange={e=>setText(e.target.value)}
            placeholder={"e.g.\nMon 7/14 - push day\nbench 3x8 @ 185\nohp 135 x8x8x6\n20 min bike"} />
          <button className="btn btn-primary btn-block" style={{marginTop:12}} onClick={organize}>
            Organize with AI
          </button>
        </>}

        {phase==="busy" &&
          <div className="empty" style={{padding:"60px 20px"}}>
            <span className="spin spin-lg" style={{margin:"0 auto 16px",display:"block"}}></span>
            <p>Reading your history...</p>
          </div>}

        {phase==="review" && <>
          <p className="hint" style={{marginTop:4}}>
            Review before saving. Tap a workout to include or skip it; fix any dates.
            Exercises marked "new" will be added to your library.
          </p>
          {err && <div className="auth-msg err" style={{marginTop:10}}>{err}</div>}
          {parsed.map((w,i) => (
            <div key={i} className="entry" style={{opacity: w.include?1:.45}}>
              <div className="entry-head">
                <div style={{flex:1,minWidth:0}}>
                  <div className="entry-name">{w.name}</div>
                  <input className="input" type="date" value={w.date} style={{marginTop:8,maxWidth:180,padding:"8px 10px"}}
                    onChange={e=>setDate(i, e.target.value||todayStr())} />
                </div>
                <button className={"pill "+(w.include?"on":"")} style={{flex:"0 0 auto"}} onClick={()=>toggle(i)}>
                  {w.include ? "Include" : "Skip"}
                </button>
              </div>
              {w.entries.map((e,j) => (
                <div key={j} className="set-row" style={{cursor:"default"}}>
                  <span className="set-main" style={{fontWeight:500}}>
                    {e.name}
                    {e.sets.length>0 && " - "+e.sets.length+" set"+(e.sets.length===1?"":"s")+
                      " (top "+e.sets.reduce((a,b)=>b.reps*b.weight>=a.reps*a.weight?b:a,e.sets[0]).reps+
                      " x "+fmtW(e.sets.reduce((a,b)=>b.reps*b.weight>=a.reps*a.weight?b:a,e.sets[0]).weight)+" "+units+")"}
                    {e.cardio && " - "+e.cardio.minutes+" min"+(e.cardio.distance>0?" / "+fmtW(e.cardio.distance)+" "+e.cardio.unit:"")}
                  </span>
                  {!e.matched && <span className="chip violet" style={{flex:"0 0 auto"}}>new</span>}
                </div>
              ))}
            </div>
          ))}
          {skipped.length>0 &&
            <div className="card" style={{marginTop:12}}>
              <div className="subtle" style={{marginBottom:6}}>Couldn't interpret:</div>
              {skipped.map((s,i)=><div key={i} className="hint">{String(s).slice(0,120)}</div>)}
            </div>}
          <button className="btn btn-primary btn-block" style={{marginTop:14}} onClick={importAll}>
            Import {parsed.filter(p=>p.include).length} workout{parsed.filter(p=>p.include).length===1?"":"s"}
          </button>
          <button className="btn btn-ghost btn-block" style={{marginTop:8}} onClick={()=>{ setPhase("paste"); setErr(""); }}>
            Back to paste
          </button>
        </>}
      </div>
    </div>
  );
}

/* ============================================================
   ROUTINES - reusable workout templates (the PriorityCaptain Templates
   pattern). Create/edit; "Start" instantiates a pre-filled workout;
   finished workouts can be captured back as routines.
   ============================================================ */
function RoutinesScreen({ store, onOpen, onAdd, onStart, onImport, onBuild }){
  const routines = (store.data.routines||[]).slice()
    .sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  if(!routines.length){
    return (
      <div className="empty">
        <div className="glyph">&gt;</div>
        <h3 className="title-sm">Reusable routines</h3>
        <p>Build a routine once - push day, 5x5, hotel circuit - then start a
        pre-filled workout from it in one tap. Or finish a workout you liked
        and save it as a routine from its detail view.</p>
        <button className="btn btn-primary" style={{marginTop:18}} onClick={onBuild}>
          Build me a program
        </button>
        <div className="row" style={{marginTop:12,justifyContent:"center"}}>
          <button className="btn btn-ghost btn-sm" onClick={onAdd}>
            <Icon d={ICONS.plus} size={15}/> New routine
          </button>
          <button className="btn btn-ghost btn-sm" onClick={onImport}>
            Import a program
          </button>
        </div>
      </div>
    );
  }
  return (
    <div className="list">
      {routines.map(r => (
        <div key={r.id} className="item" style={{alignItems:"center"}}>
          <button style={{flex:1,minWidth:0,textAlign:"left",display:"block"}} onClick={()=>onOpen(r)}>
            <div className="item-title">{r.name}</div>
            <div className="item-meta">
              <span className="chip amber">{(r.items||[]).length} exercise{(r.items||[]).length===1?"":"s"}</span>
              {r.gymName && <span className="chip blue">{r.gymName}</span>}
            </div>
          </button>
          <button className="btn btn-primary btn-sm" style={{flex:"0 0 auto"}} onClick={(e)=>{ e.stopPropagation(); onStart(r); }}>
            Start
          </button>
        </div>
      ))}
      <div className="row" style={{marginTop:4}}>
        <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={onBuild}>
          Build me a program
        </button>
        <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={onImport}>
          Import a program
        </button>
      </div>
    </div>
  );
}

/* Two ways to get a program into the app, one shared review-before-save:
   mode "paste" - convert a pasted program into routines (import_routines).
   mode "build" - the AI PROGRAM BUILDER: minutes/day + days/week + goals +
   gym (its inventory becomes a hard equipment constraint) -> a designed
   week (routine_suggest) -> the same review screen. */
function ImportRoutinesLayer({ store, mode, onClose, onImported }){
  const build = mode === "build";
  const [phase, setPhase] = useState(build ? "intake" : "paste");   // intake | paste | busy | review
  const [text, setText] = useState("");
  const [err, setErr] = useState("");
  const [parsed, setParsed] = useState([]);
  const [skipped, setSkipped] = useState([]);
  // intake answers (Chris's spec: ask minutes/day and days/week first)
  const [bMins, setBMins] = useState(30);
  const [bDays, setBDays] = useState(5);
  const [bGymId, setBGymId] = useState(store.cfg.lastGymId || null);
  const [goals, setGoals] = useState("");

  // Shared: model output -> review rows. forcedGym pins every routine to one
  // gym (builder); undefined means "trust the per-routine gym name" (paste).
  const toReview = (out, forcedGym) => {
    let obj;
    try{ obj = JSON.parse(stripFences(out)); }
    catch(e){ throw new Error(build ? "Couldn't read the result - try again." : "Couldn't read the result. Try a smaller chunk."); }
    const rs = Array.isArray(obj && obj.routines) ? obj.routines : [];
    if(!rs.length) throw new Error(build ? "No program came back - try again." : "No routines found in that text.");
    const lib = {}; (store.data.exercises||[]).forEach(x=>{ lib[normName(x.name)] = x; });
    const review = rs.map(r => {
      const gym = forcedGym !== undefined ? forcedGym
        : ((store.gyms||[]).find(g => g.name === r.gym) || null);
      return {
        include: true,
        name: (r.name||"Routine").slice(0,60),
        gymId: gym ? gym.id : null, gymName: gym ? gym.name : null,
        items: (Array.isArray(r.items)?r.items:[]).map(it => ({
          name: String(it.exercise||"Exercise").slice(0,60),
          type: EXERCISE_TYPES.includes(it.type) ? it.type : "strength",
          targetSets: Math.max(0, Math.min(10, Math.round(Number(it.targetSets)||0))),
          targetReps: Math.max(0, Math.min(100, Math.round(Number(it.targetReps)||0))),
          matched: !!lib[normName(String(it.exercise||""))],
        })).filter(it=>it.name),
      };
    }).filter(r => r.items.length);
    if(!review.length) throw new Error("Nothing usable was parsed.");
    setParsed(review);
    setSkipped(Array.isArray(obj.skipped) ? obj.skipped.slice(0,20) : []);
    setPhase("review");
  };

  const organize = async () => {
    const t = text.trim();
    if(t.length < 10){ setErr("Paste a program first."); return; }
    setErr(""); setPhase("busy");
    try{
      const names = (store.data.exercises||[]).map(x=>x.name);
      const gymNames = (store.gyms||[]).map(g=>g.name);
      const system = "You convert a pasted training program into strict JSON. Return ONLY a JSON " +
        "object, no prose and no markdown fences: " +
        '{"routines":[{"name":"...","gym":"gym name or null","items":[{"exercise":"name",' +
        '"type":"strength|cardio|mobility","targetSets":N,"targetReps":N}]}],' +
        '"skipped":["lines you could not interpret"]}. ' +
        "Rules: one routine per named day/section, keep the section's name. " +
        "When an exercise clearly matches one of the user's library names use the library name EXACTLY: " +
        names.join(", ") + ". Otherwise use a clean title-case name. " +
        "type: lifts and carries = strength; running/bike/row intervals = cardio; stretches, holds and " +
        "mobility drills = mobility. targetSets/targetReps: for strength use the text's sets and reps " +
        "(per-side counts stay as written; default 3 and 10 if unstated); for cardio/mobility use 0 and 0. " +
        "Supersets become separate consecutive items. " +
        (gymNames.length ? 'gym: one of "'+gymNames.join('", "')+'" when the text names it, else null. ' : "gym: always null. ") +
        "Never invent routines or exercises not in the text.";
      const out = await aiRelay("import_routines",
        [{ role:"user", content: t.slice(0, 20000) }],
        { system, maxTokens: 8000 });
      toReview(out, undefined);
      log("IMPORT","parsed routines from paste");
    }catch(e){
      setErr(e.message||"Import failed."); setPhase("paste");
      log("ERROR","import_routines: "+e.message);
    }
  };

  const buildProgram = async () => {
    if(goals.trim().length < 3){ setErr("Say what you're training for - a few words is plenty."); return; }
    setErr(""); setPhase("busy");
    try{
      const gym = (store.gyms||[]).find(g => g.id === bGymId) || null;
      const names = (store.data.exercises||[]).map(x=>x.name);
      // Time honesty: ~3 min per strength set incl. rest, minus warm-up/down.
      const setBudget = Math.max(6, Math.round((bMins-8)/3));
      const gymCtx = gym
        ? ((gym.equipment||[]).join(", ") +
           (gym.inventory ? ". Inventory: " + String(gym.inventory).replace(/\s+/g," ").slice(0,1500) : ""))
        : null;
      const system = "You are a careful strength and conditioning coach designing a weekly training " +
        "program. Return ONLY strict JSON, no prose and no markdown fences: " +
        '{"routines":[{"name":"...","items":[{"exercise":"name",' +
        '"type":"strength|cardio|mobility","targetSets":N,"targetReps":N}]}],"skipped":[]}. ' +
        "Rules: EXACTLY " + bDays + " routines, one per training day, each named 'P<n> - <focus>' " +
        "(e.g. 'P1 - Lower Strength'). Every day must genuinely fit in " + bMins + " minutes including " +
        "a short warm-up: budget about 3 minutes per strength set with rest, so keep each day to roughly " +
        setBudget + " total strength sets plus at most 2-3 mobility or cardio items. " +
        "Spread the goals across the week; strength days get heavy compound anchors, power work comes " +
        "before fatigue, and mobility appears where it serves the goals. " +
        (gymCtx
          ? "Equipment available - prescribe ONLY movements this equipment supports: " + gymCtx + ". "
          : "Assume a minimal travel setup: bodyweight, dumbbells, a bench, and one cardio machine. ") +
        "When a movement matches one of the user's library names use it EXACTLY: " + names.join(", ") + ". " +
        "Otherwise use a clean title-case name. type: lifts and carries = strength; intervals or steady " +
        "cardio = cardio; stretches, holds and drills = mobility. targetSets/targetReps: strength gets " +
        "real numbers; cardio and mobility use 0 and 0 and carry their duration in the name " +
        "(e.g. 'AssaultBike Intervals - 12 min').";
      const user = "Goals: " + goals.trim().slice(0,1200) + "\n" +
        "Time: " + bMins + " minutes per day, " + bDays + " days per week." +
        (gym ? "\nTraining at: " + gym.name + "." : "\nNo fixed gym - traveling.");
      const out = await aiRelay("routine_suggest",
        [{ role:"user", content: user }],
        { system, maxTokens: 8000 });
      toReview(out, gym);
      log("BUILD","program built ("+bDays+"d x "+bMins+"min)");
    }catch(e){
      setErr(e.message||"Couldn't build the program."); setPhase("intake");
      log("ERROR","routine_suggest: "+e.message);
    }
  };

  const toggle = (i) => setParsed(p => p.map((r,j)=> j===i ? {...r, include:!r.include} : r));

  const importAll = () => {
    const inc = parsed.filter(r=>r.include);
    if(!inc.length){ setErr("Everything is set to skip."); return; }
    const lib = {}; (store.data.exercises||[]).forEach(x=>{ lib[normName(x.name)] = x; });
    const created = [];
    inc.forEach(r => r.items.forEach(it => {
      const key = normName(it.name);
      if(!lib[key]){
        const x = { id: uid(), name: it.name, type: it.type, muscleGroup: "Full body",
                    equipment: "none", notes: "", custom: true,

/* Full-screen routine editor (same layer pattern as the workout editor). */
function RoutineEditor({ store, routineId, onClose, onDelete, onStart }){
  const routine = (store.data.routines||[]).find(r=>r.id===routineId);
  const [picker, setPicker] = useState(false);
  if(!routine) return null;
  const gym = (store.gyms||[]).find(g=>g.id===routine.gymId) || null;

  const patch = (p) => store.saveCollection("routines",
    (store.data.routines||[]).map(r => r.id===routine.id ? { ...r, ...p, updatedAt: nowISO() } : r));
  const patchItem = (id, p) => patch({ items: (routine.items||[]).map(it => it.id===id ? { ...it, ...p } : it) });
  const removeItem = (id) => patch({ items: (routine.items||[]).filter(it => it.id!==id) });
  const addExercise = (x) => {
    patch({ items: [...(routine.items||[]), {
      id: uid(), exerciseId: x.id, name: x.name, type: x.type,
      targetSets: 3, targetReps: 10,
    }]});
    setPicker(false);
  };
  const createAndAdd = (name) => {
    const x = { id: uid(), name, type:"strength", muscleGroup:"Full body", equipment:"none",
                notes:"", custom:true, createdAt: nowISO(), updatedAt: nowISO() };
    store.saveCollection("exercises", [x, ...(store.data.exercises||[])]);
    addExercise(x);
  };
  const setGym = (g) => patch({ gymId: g ? g.id : null, gymName: g ? g.name : null });
  const bump = (it, field, delta, min, max) => patchItem(it.id, { [field]: Math.max(min, Math.min(max, (Number(it[field])||0) + delta)) });

  const sBtn = { width:34, height:34, borderRadius:"50%", background:"var(--bg-4)", border:"1px solid var(--line-2)",
                 display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:17, fontWeight:700, flex:"0 0 auto" };

  return (
    <div className="editor">
      <div className="editor-inner">
        <div className="editor-top">
          <button className="icon-btn" onClick={onClose} aria-label="Back"><Icon d={ICONS.back} size={20}/></button>
          <div className="editor-title">
            <input defaultValue={routine.name||""} onBlur={e=>{ if(e.target.value!==routine.name) patch({name:e.target.value||"Routine"}); }}
              placeholder="Routine name" />
            <div className="elapsed">{(routine.items||[]).length} exercise{(routine.items||[]).length===1?"":"s"}</div>
          </div>
          <button className="btn btn-primary btn-sm" style={{flex:"0 0 auto"}}
            disabled={!(routine.items||[]).length} onClick={()=>onStart(routine)}>
            Start
          </button>
        </div>

        {(store.gyms||[]).length>0 &&
          <div className="pills-row">
            <button className={"pill "+(!routine.gymId?"on":"")} onClick={()=>setGym(null)}>Any gym</button>
            {(store.gyms||[]).map(g =>
              <button key={g.id} className={"pill "+(routine.gymId===g.id?"on":"")} onClick={()=>setGym(g)}>
                {g.name}
              </button>)}
          </div>}

        {(routine.items||[]).length===0 &&
          <div className="empty" style={{padding:"36px 20px"}}>
            <h3 className="title-sm">Add exercises</h3>
            <p>Pick the movements and set targets. Starting the routine creates a
            workout pre-filled with all of them.</p>
          </div>}

        {(routine.items||[]).map(it => (
          <div key={it.id} className="entry">
            <div className="entry-head">
              <div style={{flex:1,minWidth:0}}>
                <div className="entry-name">{it.name}</div>
                {it.type!=="strength" && <div className="entry-last">{it.type}</div>}
              </div>
              <button className="entry-x" onClick={()=>removeItem(it.id)} aria-label={"Remove "+it.name}>
                <Icon d={ICONS.x} size={15}/>
              </button>
            </div>
            {it.type==="strength" &&
              <div style={{display:"flex",alignItems:"center",gap:10,marginTop:8,flexWrap:"wrap"}}>
                <button style={sBtn} onClick={()=>bump(it,"targetSets",-1,1,10)} aria-label="Fewer sets">-</button>
                <span style={{fontWeight:700,fontSize:17,minWidth:20,textAlign:"center"}}>{it.targetSets}</span>
                <button style={sBtn} onClick={()=>bump(it,"targetSets",1,1,10)} aria-label="More sets">+</button>
                <span className="subtle">sets of</span>
                <button style={sBtn} onClick={()=>bump(it,"targetReps",-1,1,100)} aria-label="Fewer reps">-</button>
                <span style={{fontWeight:700,fontSize:17,minWidth:24,textAlign:"center"}}>{it.targetReps}</span>
                <button style={sBtn} onClick={()=>bump(it,"targetReps",1,1,100)} aria-label="More reps">+</button>
                <span className="subtle">reps</span>
              </div>}
          </div>
        ))}

        <button className="btn btn-ghost btn-block" style={{marginTop:14}} onClick={()=>setPicker(true)}>
          <Icon d={ICONS.plus} size={15}/> Add exercise
        </button>

        <button className="btn btn-danger btn-block" style={{marginTop:18}}
          onClick={()=>{ if(confirm("Delete this routine?")) onDelete(routine.id); }}>
          Delete routine
        </button>
      </div>

      {picker &&
        <ExercisePicker store={store} gym={gym} onPick={addExercise} onCreate={createAndAdd} onClose={()=>setPicker(false)} />}
    </div>
  );
}

/* Step 5: PROGRESS - computed entirely client-side from finished workouts.
   Three lenses: this week, 12-week volume bars, per-exercise trends
   (top-set line chart + session history + best-lift records). */
function ProgressScreen({ store }){
  const units = store.cfg.units || "lb";
  const [exId, setExId] = useState(null);
  const done = (store.data.workouts||[]).filter(w=>w.endedAt)
    .slice().sort((a,b)=>String(a.date||"").localeCompare(String(b.date||"")));

  if(!done.length){
    return (
      <div className="empty">
        <div className="glyph">^</div>
        <h3 className="title-sm">Progress</h3>
        <p>Finish a workout (or import your history) and your trends, records, and weekly volume build themselves - nothing to set up.</p>
      </div>
    );
  }

  // ---- weekly buckets: 12 weeks ending with the current week ----
  const thisWeek = weekStartStr(todayStr());
  const weeks = [];
  { const d = new Date(thisWeek+"T00:00:00"); d.setDate(d.getDate()-77);
    const p = n => String(n).padStart(2,"0");
    for(let i=0;i<12;i++){
      weeks.push(d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()));
      d.setDate(d.getDate()+7);
    } }
  const byWeek = {};
  for(const w of done){
    const k = weekStartStr(w.date); if(!k) continue;
    const b = byWeek[k] || (byWeek[k] = {count:0,vol:0,mins:0,sets:0});
    b.count++; b.vol += workoutVolume(w); b.sets += workoutSets(w);
    for(const e of (w.entries||[])) if(e.cardio) b.mins += Number(e.cardio.minutes)||0;
  }
  const cur = byWeek[thisWeek] || {count:0,vol:0,mins:0,sets:0};
  const maxVol = Math.max(1, ...weeks.map(k => (byWeek[k]||{}).vol||0));

  // ---- per-exercise stats from weighted strength sets ----
  const exStats = {};
  for(const w of done){
    for(const e of (w.entries||[])){
      const sets = (e.sets||[]).filter(s => (Number(s.weight)||0)>0 && (Number(s.reps)||0)>0);
      if(!sets.length) continue;
      const id = e.exerciseId || e.name;
      const st = exStats[id] || (exStats[id] = {id, name:e.name, sessions:[], pr:null});
      if(e.name) st.name = e.name;               // denormalized snapshot; latest wins
      let top = sets[0], vol = 0, est = 0;
      for(const s of sets){
        vol += (Number(s.reps)||0)*(Number(s.weight)||0);
        if((Number(s.weight)||0) > (Number(top.weight)||0)) top = s;
        est = Math.max(est, estMax(s.weight, s.reps));
      }
      st.sessions.push({ date:w.date, top:{weight:Number(top.weight)||0, reps:Number(top.reps)||0}, vol, est });
      if(!st.pr || (Number(top.weight)||0) > st.pr.weight)
        st.pr = { weight:Number(top.weight)||0, reps:Number(top.reps)||0, date:w.date };
    }
  }
  // Most recently trained first - the list mirrors what you're actually doing.
  const tracked = Object.values(exStats)
    .sort((a,b)=>String(b.sessions[b.sessions.length-1].date).localeCompare(String(a.sessions[a.sessions.length-1].date)));
  const sel = exId ? exStats[exId] : null;

  return (
    <div>
      <div className="set-group">This week</div>
      <div className="card">
        <div className="item-meta" style={{marginTop:0}}>
          <span className="chip amber">{cur.count} workout{cur.count===1?"":"s"}</span>
          {cur.vol>0 && <span className="chip">{fmtNum(Math.round(cur.vol))} {units} moved</span>}
          {cur.sets>0 && <span className="chip">{cur.sets} sets</span>}
          {cur.mins>0 && <span className="chip blue">{cur.mins} cardio min</span>}
        </div>
      </div>

      <div className="set-group">Weekly volume - last 12 weeks</div>
      <div className="card">
        <svg viewBox="0 0 288 96" style={{width:"100%",height:"auto",display:"block"}} aria-hidden="true">
          {weeks.map((k,i)=>{
            const v = (byWeek[k]||{}).vol||0;
            const h = v>0 ? Math.max(4, 84*v/maxVol) : 2;
            return <rect key={k} x={i*24+5} y={92-h} width={14} height={h} rx={3}
              fill={v>0 ? (k===thisWeek ? "var(--amber)" : "var(--amber-line)") : "var(--bg-4)"} />;
          })}
        </svg>
        <div className="subtle" style={{marginTop:8,fontSize:12}}>
          Total weight moved per week. Peak: {fmtNum(Math.round(maxVol))} {units}. This week is the bright bar.
        </div>
      </div>

      <div className="set-group">By exercise</div>
      {!tracked.length
        ? <div className="card"><p className="subtle" style={{margin:0}}>Log weighted sets and each exercise shows up here with its trend and best lift.</p></div>
        : <div className="list">
            {tracked.map(s => (
              <button key={s.id} className="item" onClick={()=>setExId(s.id)}>
                <div className="item-body">
                  <div className="item-title">{s.name}</div>
                  <div className="item-meta">
                    <span className="chip amber">best {fmtW(s.pr.weight)} {units} x {s.pr.reps}</span>
                    <span className="chip">{s.sessions.length} session{s.sessions.length===1?"":"s"}</span>
                    <span className="chip">{fmtDate(s.sessions[s.sessions.length-1].date)}</span>
                  </div>
                </div>
              </button>
            ))}
          </div>}

      {sel && <ExerciseProgress stat={sel} units={units} onClose={()=>setExId(null)} />}
    </div>
  );
}

/* Per-exercise drill-in: top-set trend chart + records + session log. */
function ExerciseProgress({ stat, units, onClose }){
  const ss = stat.sessions.slice(-24);                 // chart the last 24 sessions
  const bestEst = Math.max(...stat.sessions.map(s=>s.est));
  const W=288, H=110, PAD=12;
  const ws = ss.map(s=>s.top.weight);
  const lo = Math.min(...ws), hi = Math.max(...ws);
  const span = Math.max(1, hi-lo);
  const pts = ss.map((s,i)=>[
    ss.length===1 ? W/2 : PAD + (W-2*PAD)*i/(ss.length-1),
    H-PAD - (H-2*PAD)*(s.top.weight-lo)/span
  ]);
  return (
    <div className="layer">
      <div className="layer-inner">
        <div className="layer-top">
          <button className="btn btn-ghost btn-sm" onClick={onClose}><Icon d={ICONS.back} size={15}/> Progress</button>
          <h2>{stat.name}</h2>
        </div>

        <div className="item-meta" style={{margin:"2px 0 14px"}}>
          <span className="chip amber">best {fmtW(stat.pr.weight)} {units} x {stat.pr.reps}</span>
          {bestEst > stat.pr.weight &&
            <span className="chip">est. max ~{fmtNum(Math.round(bestEst))} {units}</span>}
          <span className="chip">{stat.sessions.length} session{stat.sessions.length===1?"":"s"}</span>
        </div>

        {ss.length>=2 &&
          <div className="card">
            <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}} aria-hidden="true">
              <polyline points={pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ")}
                fill="none" stroke="var(--amber)" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
              {pts.map((p,i)=>(
                <circle key={i} cx={p[0]} cy={p[1]} r={i===pts.length-1 ? 4 : 2.5}
                  fill={i===pts.length-1 ? "var(--amber)" : "var(--amber-2)"} />
              ))}
            </svg>
            <div className="updrow" style={{marginTop:8}}>
              <span className="subtle" style={{fontSize:12}}>Top set per session: {fmtW(lo)}-{fmtW(hi)} {units}</span>
              <span className="subtle" style={{fontSize:12}}>{fmtDate(ss[0].date)} - {fmtDate(ss[ss.length-1].date)}</span>
            </div>
          </div>}

        <div className="set-group">Sessions</div>
        <div className="list">
          {stat.sessions.slice().reverse().map((s,i)=>(
            <div key={i} className="item" style={{cursor:"default"}}>
              <div className="item-body">
                <div className="item-title" style={{fontSize:15}}>{fmtDate(s.date)}</div>
                <div className="item-meta">
                  <span className="chip amber">top {fmtW(s.top.weight)} {units} x {s.top.reps}</span>
                  <span className="chip">{fmtNum(Math.round(s.vol))} {units} total</span>
                  {s.top.weight===stat.pr.weight && s.date===stat.pr.date && <span className="chip green">PR</span>}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

  const [importer, setImporter] = useState(false);    // AI history import layer
  const [routineImporter, setRoutineImporter] = useState(null);   // null | "paste" | "build" (AI program layer)
  const [gymSheet, setGymSheet] = useState(null);     // null | {gym: rec|null}
  const [gymView, setGymView] = useState(null);       // open gym place page (id)

  // ---- gym CRUD ----
  const saveGym = (rec) => {
    const gyms = store.gyms || [];
    const exists = gyms.some(g => g.id === rec.id);
    store.saveGyms(exists ? gyms.map(g => g.id===rec.id ? rec : g) : [...gyms, rec]);
    setGymSheet(null);
    showToast(exists ? "Gym updated" : "Gym added");
  };
  const deleteGym = (id) => {
    store.saveGyms((store.gyms||[]).filter(g => g.id !== id));
    if(store.cfg.lastGymId === id) store.saveCfg({ ...store.cfg, lastGymId: null });
    setGymSheet(null); setGymView(null);
    showToast("Gym deleted");
  };
  const [toast, setToast] = useState("");
  const toastRef = useRef();
  const showToast = (m) => { setToast(m); clearTimeout(toastRef.current); toastRef.current = setTimeout(()=>setToast(""), 2200); };

  // ---- workout lifecycle ----
  // atGym (optional) starts the workout AT that gym (from a place page).
  // Guarded because plain onClick handlers pass an event object here.
  const startWorkout = (atGym) => {
    const gymArg = (atGym && atGym.id && atGym.name) ? atGym : null;
    const existing = (store.data.workouts||[]).find(w=>!w.endedAt);
    if(existing){
      // One active at a time; "start here" retargets its gym.
      if(gymArg && existing.gymId !== gymArg.id){
        store.saveCollection("workouts", (store.data.workouts||[]).map(w =>
          w.id===existing.id ? { ...w, gymId: gymArg.id, gymName: gymArg.name, updatedAt: nowISO() } : w));
      }
      setWorkoutId(existing.id); return;
    }
    const gym = gymArg || (store.gyms||[]).find(g=>g.id===store.cfg.lastGymId) || null;
    const w = { id: uid(), name: dayPartName(), date: todayStr(), startedAt: nowISO(),
                endedAt: null, durationMin: 0, notes: "", entries: [],
                gymId: gym ? gym.id : null, gymName: gym ? gym.name : null };
    store.saveCollection("workouts", [w, ...(store.data.workouts||[])]);
    if(gymArg) store.saveCfg({ ...store.cfg, lastGymId: gymArg.id });
    setWorkoutId(w.id);
  };
  const startHere = (g) => { setGymView(null); setTab("workouts"); startWorkout(g); };

  // ---- routines ----
  const [routineId, setRoutineId] = useState(null);   // open routine editor
  const createRoutine = () => {
    const r = { id: uid(), name: "New routine", items: [], gymId: null, gymName: null,
                createdAt: nowISO(), updatedAt: nowISO() };
    store.saveCollection("routines", [r, ...(store.data.routines||[])]);
    setRoutineId(r.id);
  };
  const deleteRoutine = (id) => {
    store.saveCollection("routines", (store.data.routines||[]).filter(r => r.id !== id));
    setRoutineId(null);
    showToast("Routine deleted");
  };
  // Instantiate a routine into a pre-filled workout (the whole point).
  const startRoutine = (r) => {
    const existing = (store.data.workouts||[]).find(w=>!w.endedAt);
    if(existing){ showToast("Finish the workout in progress first"); setWorkoutId(existing.id); setRoutineId(null); return; }
    const gym = (store.gyms||[]).find(g=>g.id===r.gymId)
             || (store.gyms||[]).find(g=>g.id===store.cfg.lastGymId) || null;
    const w = { id: uid(), name: r.name, date: todayStr(), startedAt: nowISO(),
                endedAt: null, durationMin: 0, notes: "", routineId: r.id,
                gymId: gym ? gym.id : null, gymName: gym ? gym.name : null,
                entries: (r.items||[]).map(it => ({
                  id: uid(), exerciseId: it.exerciseId, name: it.name, type: it.type,
                  sets: [], cardio: null,
                  targetSets: it.targetSets, targetReps: it.targetReps,
                })) };
    store.saveCollection("workouts", [w, ...(store.data.workouts||[])]);
    setRoutineId(null); setTab("workouts"); setWorkoutId(w.id);
  };
  // Capture a finished workout as a reusable routine.
  const saveAsRoutine = (w) => {
    const items = (w.entries||[]).filter(e => (e.sets||[]).length || e.cardio || e.type!=="strength")
      .map(e => {
        const reps = (e.sets||[]).map(s=>Number(s.reps)||0).filter(Boolean);
        const mode = reps.length ? reps.sort((a,b)=> reps.filter(v=>v===a).length - reps.filter(v=>v===b).length).pop() : 10;
        return { id: uid(), exerciseId: e.exerciseId, name: e.name, type: e.type,
                 targetSets: (e.sets||[]).length || 3, targetReps: mode };
      });
    if(!items.length){ showToast("Nothing to capture from this workout"); return; }
    const r = { id: uid(), name: w.name || "Routine", items,
                gymId: w.gymId||null, gymName: w.gymName||null,
                createdAt: nowISO(), updatedAt: nowISO() };
    store.saveCollection("routines", [r, ...(store.data.routines||[])]);
    showToast("Saved as routine: "+r.name);
  };
  const finishWorkout = (w) => {
    const mins = Math.max(1, Math.round((Date.now() - new Date(w.startedAt).getTime())/60000));
    store.saveCollection("workouts",
      (store.data.workouts||[]).map(x => x.id===w.id ? { ...x, endedAt: nowISO(), durationMin: mins, updatedAt: nowISO() } : x));
    setWorkoutId(null);
    showToast("Workout saved - "+mins+" min");
  };
  const deleteWorkout = (id) => {
    store.saveCollection("workouts", (store.data.workouts||[]).filter(w => w.id !== id));
    setWorkoutId(null);
    showToast("Workout deleted");
  };

  // ---- exercise CRUD ----
  const saveExercise = (rec) => {
    const list = store.data.exercises || [];
    const exists = list.some(x => x.id === rec.id);
    store.saveCollection("exercises", exists ? list.map(x => x.id===rec.id ? rec : x) : [rec, ...list]);
    setExSheet(null);
    showToast(exists ? "Exercise updated" : "Exercise added");
  };
  const deleteExercise = (id) => {
    store.saveCollection("exercises", (store.data.exercises||[]).filter(x => x.id !== id));
    setExSheet(null);
    showToast("Exercise deleted");
  };

  // --- PWA self-update: fetch the deployed index.html (no-store), read its
  // BUILD stamp, offer a one-tap refresh when a genuinely newer build is live.
  // Checks on launch AND resume AND a periodic timer - installed PWAs are
  // usually RESUMED, not cold-launched (portable fix from MenuCaptain).
  const [update, setUpdate] = useState(null);   // { build } of a newer deployed build, else null
  const [updState, setUpdState] = useState("");
  const [updMsg, setUpdMsg] = useState("");
  const updTimer = useRef(null);
  const flashUpd = useCallback((msg)=>{ setUpdMsg(msg); if(updTimer.current) clearTimeout(updTimer.current); updTimer.current = setTimeout(()=>setUpdMsg(""), 4000); },[]);
  const checkUpdate = useCallback(async (manual=false)=>{
    if(manual){ setUpdState("checking"); setUpdMsg(""); }
    try{
      const res = await fetch(location.pathname + "?_=" + Date.now(), { cache:"no-store" });
      if(!res.ok){ log("UPDATE","check http "+res.status); if(manual){ setUpdState(""); flashUpd("Couldn't check - are you online?"); } return; }
      const html = await res.text();
      const mb = html.match(/const BUILD = "([^"]+)";/);
      const remote = mb && mb[1];
      if(remote && buildIsNewer(remote, BUILD)){
        log("UPDATE","newer build live: "+remote);
        setUpdate({ build: remote });
        if(manual) setUpdState("");
      } else {
        log("UPDATE","up to date (v"+APP_VERSION+", "+BUILD+")");
        setUpdate(null);
        if(manual){ setUpdState(""); flashUpd("You're on the latest (v"+APP_VERSION+")"); }
      }
    }catch(e){ log("UPDATE","check failed: "+e.message); if(manual){ setUpdState(""); flashUpd("Update check failed"); } }
  },[flashUpd]);
  useEffect(()=>{
    let last=0; const GAP=60*1000;
    const maybe=()=>{ const now=Date.now(); if(now-last<GAP) return; last=now; checkUpdate(false); };
    const t=setTimeout(maybe, 1500);                       // initial launch check
    const onVis=()=>{ if(document.visibilityState==="visible") maybe(); };
    document.addEventListener("visibilitychange", onVis);
    const iv=setInterval(maybe, 20*60*1000);               // periodic while open
    return ()=>{ clearTimeout(t); clearInterval(iv); document.removeEventListener("visibilitychange", onVis); };
  },[checkUpdate]);

  // Service worker: app-shell offline caching. Registered with a RELATIVE path
  // so the scope is /fitnesscaptain-app/ on GitHub Pages ("/sw.js" would 404).
  // Deliberately no web manifest (template decision): without one, Add to Home
  // Screen uses the current page URL as the launch URL.
  useEffect(()=>{
    if(!("serviceWorker" in navigator)) return;
    const onLoad = ()=>{ navigator.serviceWorker.register("sw.js")
      .then(()=>log("SW","registered"))
      .catch(e=>log("SW","register failed: "+(e&&e.message))); };
    if(document.readyState==="complete") onLoad(); else window.addEventListener("load", onLoad);
    return ()=>window.removeEventListener("load", onLoad);
  },[]);

  // Apply by navigating to a build-stamped URL so iOS can't serve cached HTML.
  // Wipe the SW caches first so the new build is never masked by a cached shell.
  function applyUpdate(){
    const stamp=(update&&update.build)||String(Date.now());
    log("UPDATE","applying -> "+stamp);
    try{ if(navigator.serviceWorker && navigator.serviceWorker.controller) navigator.serviceWorker.controller.postMessage("clearCache"); }catch(_){}
    window.location.replace(location.pathname + "?u=" + encodeURIComponent(stamp));
  }

  if(!store.authReady){
    return <div className="app"><div className="spin spin-lg"></div></div>;
  }
  if(store.recovery){
    return <SetPassword store={store} />;
  }
  if(!store.authed){
    return <AuthScreen store={store} />;
  }

  const activeTab = TABS.find(t=>t.key===tab) || TABS[0];

  return (
    <div className="app">
      {update &&
        <button className="update-bar" onClick={applyUpdate}>
          <span>A new version of FitnessCaptain is ready.</span>
          <span className="update-go">Update</span>
        </button>}

      <div className="topbar">
        <div className="topbar-row">
          <div>
            <div className="eyebrow">{inSettings ? "Configure" : activeTab.eyebrow}</div>
            <h1 className="title">{inSettings ? "Settings" : activeTab.label}</h1>
          </div>
          <button className="icon-btn" onClick={()=>setInSettings(s=>!s)} aria-label="Settings">
            <Icon d={inSettings ? ICONS.back : ICONS.gear} size={21}/>
          </button>
        </div>
        <div className={"sync "+store.sync}>
          <span className="dot"></span>
          {store.sync==="idle" && "All changes saved"}
          {store.sync==="busy" && "Syncing..."}
          {store.sync==="pending" && "Offline - will sync"}
          {store.sync==="error" && (store.syncMsg || "Sync error")}
        </div>
      </div>

      <div className="screen">
        {inSettings
          ? <SettingsScreen store={store} onCheckUpdate={checkUpdate} updateState={updState} updMsg={updMsg} />
          : <>
              {tab==="workouts"  && <WorkoutsScreen store={store} onStart={startWorkout} onOpen={(w)=>setWorkoutId(w.id)} onImport={()=>setImporter(true)} />}
              {tab==="gyms"      && <GymsScreen store={store} onOpen={(g)=>setGymView(g.id)} onAdd={()=>setGymSheet({gym:null})} />}
              {tab==="exercises" && <ExercisesScreen store={store} onAdd={()=>setExSheet({exercise:null})} onEdit={(x)=>setExSheet({exercise:x})} />}
              {tab==="routines"  && <RoutinesScreen store={store} onOpen={(r)=>setRoutineId(r.id)} onAdd={createRoutine} onStart={startRoutine} onImport={()=>setRoutineImporter("paste")} onBuild={()=>setRoutineImporter("build")} />}
              {tab==="progress"  && <ProgressScreen store={store} />}
            </>}
      </div>

      {!inSettings && tab==="workouts" && !workoutId &&
        <button className="fab" onClick={()=>startWorkout()} aria-label="Start workout"><Icon d={ICONS.plus} size={26}/></button>}
      {!inSettings && tab==="gyms" && !gymSheet && !gymView &&
        <button className="fab" onClick={()=>setGymSheet({gym:null})} aria-label="Add gym"><Icon d={ICONS.plus} size={26}/></button>}
      {!inSettings && tab==="routines" && !routineId &&
        <button className="fab" onClick={createRoutine} aria-label="New routine"><Icon d={ICONS.plus} size={26}/></button>}
      {!inSettings && tab==="exercises" && !exSheet &&
        <button className="fab" onClick={()=>setExSheet({exercise:null})} aria-label="Add exercise"><Icon d={ICONS.plus} size={26}/></button>}

      {exSheet &&
        <ExerciseSheet exercise={exSheet.exercise} onSave={saveExercise} onDelete={deleteExercise} onClose={()=>setExSheet(null)} />}

      {gymView &&
        <GymDetail store={store} gymId={gymView} onEdit={(g)=>setGymSheet({gym:g})}
          onStartHere={startHere} onClose={()=>setGymView(null)} />}

      {gymSheet &&
        <GymSheet gym={gymSheet.gym} onSave={saveGym} onDelete={deleteGym} onClose={()=>setGymSheet(null)} />}

      {workoutId &&
        <WorkoutEditor key={workoutId} store={store} workoutId={workoutId}
          onClose={()=>setWorkoutId(null)} onFinish={finishWorkout} onDelete={deleteWorkout}
          onSaveAsRoutine={saveAsRoutine} />}

      {routineId &&
        <RoutineEditor key={routineId} store={store} routineId={routineId}
          onClose={()=>setRoutineId(null)} onDelete={deleteRoutine} onStart={startRoutine} />}

      {importer &&
        <ImportLayer store={store} onClose={()=>setImporter(false)}
          onImported={(nw, nx)=>{ setImporter(false);
            showToast("Imported "+nw+" workout"+(nw===1?"":"s")+(nx>0 ? " + "+nx+" new exercise"+(nx===1?"":"s") : "")); }} />}

      {routineImporter &&
        <ImportRoutinesLayer store={store} mode={routineImporter} onClose={()=>setRoutineImporter(null)}
          onImported={(nr, nx)=>{ setRoutineImporter(null); setTab("routines");
            showToast("Added "+nr+" routine"+(nr===1?"":"s")+(nx>0 ? " + "+nx+" new exercise"+(nx===1?"":"s") : "")); }} />}

      {!inSettings &&
        <nav className="nav">
          {TABS.map(t => (
            <button key={t.key} className={"nav-btn "+(tab===t.key?"on":"")} onClick={()=>setTab(t.key)}>
              <Icon d={t.icon} size={22}/>
              {t.label}
            </button>
          ))}
        </nav>}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
